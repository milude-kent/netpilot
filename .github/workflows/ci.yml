name: CI

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

# Default to least privilege; the release job opts into write below.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short
  PROTOC_VERSION: "29.3"

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # Lint — fmt + clippy. Runs on Linux. Hard gate: clippy MUST be clean.
  # ────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: |
          curl -sL "https://github.com/protocolbuffers/protobuf/releases/download/v$PROTOC_VERSION/protoc-$PROTOC_VERSION-linux-x86_64.zip" -o /tmp/protoc.zip
          unzip -o /tmp/protoc.zip -d /usr/local
          chmod +x /usr/local/bin/protoc

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: lint

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy — hard gate on warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ────────────────────────────────────────────────────────────────────────
  # Test — Linux + macOS. Uses cargo-nextest. No --ignored by default; the
  # Linux-only #[ignore] tests (drop_privs, fib_integration) are exercised
  # by the linux-root job below.
  # ────────────────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -sL "https://github.com/protocolbuffers/protobuf/releases/download/v$PROTOC_VERSION/protoc-$PROTOC_VERSION-linux-x86_64.zip" -o /tmp/protoc.zip
          unzip -o /tmp/protoc.zip -d /usr/local
          chmod +x /usr/local/bin/protoc

      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -sL "https://github.com/protocolbuffers/protobuf/releases/download/v$PROTOC_VERSION/protoc-$PROTOC_VERSION-osx-universal_binary.zip" -o /tmp/protoc.zip
          unzip -o /tmp/protoc.zip -d /usr/local
          chmod +x /usr/local/bin/protoc

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-${{ matrix.os }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test
        run: cargo nextest run --workspace --no-fail-fast

      - name: Compile benches (no run)
        run: cargo bench --workspace --no-run

  # ────────────────────────────────────────────────────────────────────────
  # Smoke — spawn netpilotd in the background and exercise its HTTP surface.
  # Linux-only because the kernel FIB / netlink paths are Linux-gated.
  # ────────────────────────────────────────────────────────────────────────
  smoke:
    name: Smoke (HTTP black-box)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: |
          curl -sL "https://github.com/protocolbuffers/protobuf/releases/download/v$PROTOC_VERSION/protoc-$PROTOC_VERSION-linux-x86_64.zip" -o /tmp/protoc.zip
          unzip -o /tmp/protoc.zip -d /usr/local
          chmod +x /usr/local/bin/protoc

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-ubuntu-latest

      - name: Build netpilotd
        run: cargo build -p netpilotd --release

      - name: Run smoke test
        run: |
          ./target/release/netpilotd &
          DAEMON_PID=$!
          # Give it a moment to bind ports.
          sleep 3
          set +e
          bash scripts/smoke-test.sh
          STATUS=$?
          set -e
          kill $DAEMON_PID || true
          wait $DAEMON_PID 2>/dev/null || true
          exit $STATUS

  # ────────────────────────────────────────────────────────────────────────
  # cargo-deny — supply-chain checks (licenses, bans, advisories, sources).
  # ────────────────────────────────────────────────────────────────────────
  deny:
    name: Supply-chain (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: |
          curl -sL "https://github.com/protocolbuffers/protobuf/releases/download/v$PROTOC_VERSION/protoc-$PROTOC_VERSION-linux-x86_64.zip" -o /tmp/protoc.zip
          unzip -o /tmp/protoc.zip -d /usr/local
          chmod +x /usr/local/bin/protoc

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: cargo-deny check
        run: cargo deny check

  # ────────────────────────────────────────────────────────────────────────
  # Coverage — lcov via cargo-llvm-cov. Uploaded to Codecov (token-less).
  # ────────────────────────────────────────────────────────────────────────
  coverage:
    name: Coverage (llvm-cov)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: |
          curl -sL "https://github.com/protocolbuffers/protobuf/releases/download/v$PROTOC_VERSION/protoc-$PROTOC_VERSION-linux-x86_64.zip" -o /tmp/protoc.zip
          unzip -o /tmp/protoc.zip -d /usr/local
          chmod +x /usr/local/bin/protoc

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: coverage

      - name: Install cargo-llvm-cov + nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov,nextest

      - name: Collect coverage
        run: cargo llvm-cov nextest --workspace --lcov --output-path coverage.lcov

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.lcov
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ────────────────────────────────────────────────────────────────────────
  # Windows — build-only (no tests). Catches path/encoding/cfg-gate regressions
  # without committing to Windows runtime support.
  # ────────────────────────────────────────────────────────────────────────
  windows-build:
    name: Windows (build only)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: choco install protoc --version=29.3 -y

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-build

      - name: Build
        # netpilot-kernel + netpilot-io have Linux-only target deps but the
        # crate roots compile via stubs on other platforms.
        run: cargo build --workspace

  # ────────────────────────────────────────────────────────────────────────
  # Release — on tag push (vX.Y.Z), build and attach a Linux binary.
  # ────────────────────────────────────────────────────────────────────────
  release:
    name: Release artifact
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [test, lint]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: |
          curl -sL "https://github.com/protocolbuffers/protobuf/releases/download/v$PROTOC_VERSION/protoc-$PROTOC_VERSION-linux-x86_64.zip" -o /tmp/protoc.zip
          unzip -o /tmp/protoc.zip -d /usr/local
          chmod +x /usr/local/bin/protoc

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release

      - name: Build release
        run: cargo build --release -p netpilotd --target x86_64-unknown-linux-gnu

      - name: Package
        run: |
          mkdir -p artifacts
          cp target/x86_64-unknown-linux-gnu/release/netpilotd \
             artifacts/netpilotd-${{ github.ref_name }}-x86_64-unknown-linux-gnu
          tar -czf artifacts/netpilotd-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz \
             -C artifacts netpilotd-${{ github.ref_name }}-x86_64-unknown-linux-gnu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: netpilotd-${{ github.ref_name }}-x86_64-unknown-linux-gnu
          path: artifacts/

      - name: Attach to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/netpilotd-${{ github.ref_name }}-x86_64-unknown-linux-gnu
            artifacts/netpilotd-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz
          generate_release_notes: true
